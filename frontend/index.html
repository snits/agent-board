<!-- ABOUTME: Main HTML shell for Agent Board, a web viewer for Claude Code agent team transcripts. -->
<!-- ABOUTME: Three-panel layout: sidebar navigation, chat message stream, and agent roster. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Board — Ops Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Left sidebar: project/session/meeting tree -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">AGENT BOARD</span>
        </div>
      </div>
      <nav id="project-tree"></nav>
    </aside>

    <!-- Center chat panel -->
    <main id="chat-panel">
      <header id="chat-header">
        <div class="header-left">
          <button id="toggle-sidebar" class="icon-btn" title="Toggle sidebar">☰</button>
          <div id="meeting-title" class="meeting-title">Select a meeting</div>
        </div>
        <div class="header-right">
          <div id="chat-controls">
            <input type="text" id="search-input" placeholder="Search messages…" autocomplete="off">
          </div>
          <button id="toggle-roster" class="icon-btn" title="Toggle roster panel">⊞</button>
        </div>
      </header>
      <div id="chat-messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">◇</div>
          <div class="empty-text">Select a meeting from the sidebar to view the conversation.</div>
        </div>
      </div>
      <div id="render-progress" class="render-progress hidden">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <span class="progress-text" id="progress-text">Loading…</span>
      </div>
    </main>

    <!-- Right roster panel -->
    <aside id="roster-panel" class="hidden">
      <div class="roster-header">
        <span class="roster-title">AGENTS</span>
        <button id="close-roster" class="icon-btn" title="Close roster">✕</button>
      </div>
      <div id="agent-roster"></div>
    </aside>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
